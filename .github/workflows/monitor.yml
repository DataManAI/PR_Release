name: Press Release Monitor

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - run: python monitor.py --once
        env:
          GMAIL_USERNAME: ${{ secrets.GMAIL_USERNAME }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_TO: ${{ secrets.GMAIL_TO }}
          SEC_EDGAR_CONTACT: ${{ secrets.SEC_EDGAR_CONTACT }}

      - name: Commit updated seen-state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.db

          if git diff --cached --quiet; then
            echo "No state changes to commit"
            exit 0
          fi

          git commit -m "Update seen-entries state"

          for attempt in 1 2 3 4 5; do
            if git push; then
              exit 0
            fi
            echo "Push rejected (attempt $attempt) - fetching and merging remote state"
            git fetch origin main
            git merge -X ours origin/main -m "Merge remote seen-state (attempt $attempt)"
          done

          echo "Failed to push seen-state after retries"
          exit 1
